<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <style>
    /* Universal fallback color reads on both light and dark backgrounds. */
    .glass { fill: none; stroke: #C29A56; stroke-width: 2.4; stroke-linecap: round; stroke-linejoin: round; }
    /* Adapt to the viewer's OS/browser theme when supported. */
    @media (prefers-color-scheme: light) { .glass { stroke: #20231C; } }
    @media (prefers-color-scheme: dark)  { .glass { stroke: #F4EBDA; } }
  </style>
  <g class="glass">
    <!-- coupe rim -->
    <ellipse cx="32" cy="18.5" rx="16" ry="3.2"/>
    <!-- coupe bowl -->
    <path d="M16 18.5 C 17 30 25 35 32 35 C 39 35 47 30 48 18.5"/>
    <!-- stem -->
    <path d="M32 35 L 32 49"/>
    <!-- foot -->
    <path d="M22.5 50 L 41.5 50"/>
  </g>
</svg>
